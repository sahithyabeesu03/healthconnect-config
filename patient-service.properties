
server.port=8082

spring.application.name=patient-service

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/healthconnect_patient
spring.datasource.username=root
spring.datasource.password=root

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka

# JWT (same secret as Auth Service)
jwt.secret=MyHealthConnectSecretKeyForJwtAuthentication2026SpringBootProject
jwt.expiration=86400000

# Actuator
management.endpoints.web.exposure.include=*

# Logging
logging.level.com.healthconnect=INFO
logging.level.org.springframework.security=DEBUG
server.port=8081

spring.application.name=auth-service

eureka.client.service-url.defaultZone=http://localhost:8761/eureka

spring.datasource.url=jdbc:mysql://localhost:3306/healthconnect_auth
spring.datasource.username=root
spring.datasource.password=root

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

jwt.secret=MyHealthConnectSecretKeyForJwtAuthentication2026SpringBootProject
jwt.expiration=86400000

management.endpoints.web.exposure.include=*

logging.level.root=INFO

logging.level.com.healthconnect=DEBUG

logging.file.name=logs/auth-service.log

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{36} - %msg%n

logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{36} - %msg%n